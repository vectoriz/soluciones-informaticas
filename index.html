<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitio en Construcción - TRON</title>
    <style>
        /* ===== RESET Y FONDO ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #0a0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', 'Helvetica', sans-serif;
            cursor: none;
            overflow: hidden;
            position: relative;
        }

        /* ===== FONDO GRID TRON ===== */
        #fondo-tron {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(0, 180, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        #fondo-tron::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 200, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.05) 0%, transparent 60%);
        }

        /* ===== TÍTULO MUCHO MÁS PEQUEÑO Y EN UNA SOLA LÍNEA ===== */
        .titulo {
            position: relative;
            z-index: 1;
            color: #e0e8f0;
            font-size: 2.2rem;      /* mucho más chico */
            font-weight: 700;
            letter-spacing: 4px;
            font-family: 'Arial', 'Helvetica', sans-serif;
            text-transform: uppercase;
            padding: 10px 20px;      /* padding reducido */
            background: none;
            backdrop-filter: none;
            box-shadow: none;
            border: none;
            user-select: none;
            transition: none;
            text-shadow: none;
            white-space: nowrap;     /* fuerza una sola línea */
        }

        /* ===== CURSOR (29px, sin ningún efecto visual) ===== */
        .cursor-personalizado {
            position: fixed;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 29px;
            height: 29px;
            transform: translate(-50%, -50%);
            z-index: 9999;
            filter: none;
            transition: none;
        }
        .cursor-personalizado svg {
            display: block;
            width: 100%;
            height: 100%;
            filter: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .titulo {
                font-size: 1.4rem;    /* aún más chico en móvil */
                letter-spacing: 2px;
                padding: 6px 12px;
            }
            .cursor-personalizado {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== FONDO TRON ===== -->
    <div id="fondo-tron"></div>

    <!-- ===== TÍTULO (pequeño, una línea) ===== -->
    <h1 class="titulo" id="titulo">Sitio en Construcción</h1>

    <!-- ===== CURSOR ===== -->
    <div class="cursor-personalizado" id="cursor">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 4 L26 22 L18 22 L22 28 L18 28 L14 22 L10 28 L6 28 Z"
            fill="white" stroke="black" stroke-width="2" stroke-linejoin="round" />
        </svg>
    </div>

    <script>
    (function() {
        const cursor = document.getElementById('cursor');
        const titulo = document.getElementById('titulo');

        let animando = false;
        let mouseX = 0, mouseY = 0;
        let animFrameId = null;

        // Seguimiento del mouse
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (!animando) {
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
            }
        });

        // Simulador de vuelo (7 segundos) con regreso suave
        function animarVuelo(x, y) {
            const duracion = 7000;
            const inicio = performance.now();

            const anguloBase = Math.random() * 2 * Math.PI;
            const velocidad = 180 + Math.random() * 200;
            const ampLateral = 80 + Math.random() * 140;
            const ampVertical = 40 + Math.random() * 80;
            const freqLateral = 0.6 + Math.random() * 1.2;
            const freqVertical = 0.4 + Math.random() * 0.9;
            const faseLateral = Math.random() * 2 * Math.PI;
            const faseVertical = Math.random() * 2 * Math.PI;

            const rotBase = (Math.random() - 0.5) * 20;
            const rotAmp = 10 + Math.random() * 20;

            function frame(timestamp) {
                const progreso = Math.min((timestamp - inicio) / duracion, 1);
                const ease = progreso < 0.5 ? 2 * progreso * progreso : 1 - Math.pow(-2 * progreso + 2, 2) / 2;

                const avance = velocidad * ease;
                let dx = Math.cos(anguloBase) * avance;
                let dy = Math.sin(anguloBase) * avance;

                const oscLateral = Math.sin(progreso * Math.PI * freqLateral + faseLateral) * ampLateral * ease;
                const oscVertical = Math.cos(progreso * Math.PI * freqVertical + faseVertical) * ampVertical * ease * 0.5;

                const perpX = -Math.sin(anguloBase);
                const perpY = Math.cos(anguloBase);
                dx += perpX * oscLateral;
                dy += perpY * oscLateral;
                dy += oscVertical;

                let currentX = x + dx;
                let currentY = y + dy;

                // Regreso suave a la posición del mouse a partir del 75%
                const inicioRegreso = 0.75;
                if (progreso >= inicioRegreso) {
                    const factorRegreso = (progreso - inicioRegreso) / (1 - inicioRegreso);
                    const suavizado = factorRegreso < 0.5 ? 2 * factorRegreso * factorRegreso : 1 - Math.pow(-2 * factorRegreso + 2, 2) / 2;
                    currentX = currentX + (mouseX - currentX) * suavizado;
                    currentY = currentY + (mouseY - currentY) * suavizado;
                }

                // Escala con profundidad y regreso a 1
                const factorProfundidad = 0.3 + 0.2 * Math.sin(progreso * Math.PI * 2.5);
                const escalaY = 1 + 0.3 * (currentY - y) / 300;
                let escala = Math.min(1.6, Math.max(0.6, 1 + factorProfundidad * 0.4 + escalaY * 0.2));
                if (progreso > 0.8) {
                    const factor = (progreso - 0.8) / 0.2;
                    escala = escala + (1 - escala) * factor * factor;
                }

                let rot = rotBase + Math.sin(progreso * Math.PI * 2.0) * rotAmp;
                if (progreso > 0.8) {
                    const factor = (progreso - 0.8) / 0.2;
                    rot = rot * (1 - factor);
                }

                cursor.style.left = currentX + 'px';
                cursor.style.top = currentY + 'px';
                cursor.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(${escala})`;
                cursor.style.opacity = '1';

                if (progreso < 1) {
                    animFrameId = requestAnimationFrame(frame);
                } else {
                    cursor.style.transform = 'translate(-50%, -50%)';
                    cursor.style.left = mouseX + 'px';
                    cursor.style.top = mouseY + 'px';
                    cursor.style.opacity = '1';
                    animando = false;
                }
            }
            animFrameId = requestAnimationFrame(frame);
        }

        function iniciarVuelo() {
            if (animando) return;
            if (animFrameId) cancelAnimationFrame(animFrameId);

            animando = true;
            const x = parseFloat(cursor.style.left) || mouseX;
            const y = parseFloat(cursor.style.top) || mouseY;
            animarVuelo(x, y);
        }

        // Eventos
        titulo.addEventListener('mouseenter', iniciarVuelo);

        // Posición inicial
        setTimeout(() => {
            cursor.style.left = '50vw';
            cursor.style.top = '50vh';
            mouseX = window.innerWidth / 2;
            mouseY = window.innerHeight / 2;
        }, 10);

        window.addEventListener('beforeunload', function() {
            if (animFrameId) cancelAnimationFrame(animFrameId);
        });

    })();
    </script>
</body>
</html>
